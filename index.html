            backdrop-filter: blur(10px);

            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);

        .sub-logo { font-size: 11px; opacity: 0.6; font-weight: 300; margin-top: 2px; letter-spacing: 0.5px; }
        
        /* 个人链接样式 */
        .author-link {
            color: inherit;
            text-decoration: none;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }
        .author-link:hover {
            opacity: 1;
            color: var(--accent);
            border-bottom: 1px solid var(--accent);
        }

        /* 主容器 */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        /* 玻璃拟态卡片 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 答题进度样式 */
        .progress-section { margin-bottom: 30px; }
        .progress-track {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
        }

        /* 题目样式 */
        h2 { font-size: 22px; margin-bottom: 30px; font-weight: 400; line-height: 1.6; }

            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 18px 25px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;

        .option-item:hover { 
            background: rgba(255, 255, 255, 0.15); 
            transform: scale(1.02); 
            border-color: var(--accent);
        }
        .option-dot { width: 10px; height: 10px; border: 1.5px solid white; border-radius: 50%; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .action-btn {
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .primary-btn { background: var(--accent); color: white; width: 100%; padding: 18px; font-size: 18px; }
        .secondary-btn { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.1); }

        .res-code { font-size: 50px; font-weight: 800; letter-spacing: 5px; margin: 10px 0; }
        .res-title { font-size: 24px; color: var(--accent); font-weight: 600; }

    </style>
</head>

        'ENTP': { name: '辩论家型', icon: '💡', tags: ['好奇', '辩论', '敏捷'], desc: '你是聪明且充满好奇心的思考者，无法拒绝任何智力上的挑战。', career: '理想环境：需要不断创新和颠覆传统的工作场景。' },
        'ISTP': { name: '鉴赏家型', icon: '🛠️', tags: ['动手', '适应', '实用'], desc: '你喜欢用双手探索世界，在危机时刻能保持惊人的冷静。', career: '理想环境：允许独立操作和解决实际问题的技术环境。' },
        'INTP': { name: '逻辑学家型', icon: '🔬', tags: ['理论', '逻辑', '原创'], desc: '你是天生的哲学家，总是在思考如何用逻辑解释万物。', career: '理想环境：高度自由、允许深度学术研究的机构。' },
        'ESFJ': { name: '执政官型', icon: '🤝', tags: ['利他', '和谐', '周到'], desc: '你是社交达人，致力于通过关怀和奉献来建立和谐的社区。', career: '理想环境：需要高度共情和团队服务的公共领域。' },
        'ENFJ': { name: '主人公型', icon: '🎤', tags: ['魅力', '共情', '激励'], desc: '你是富有魅力的领导者，能够看透他人的潜能并给予启发。', career: '理想环境：教育、心理咨询或社会影响力驱动的行业。' },
        'ISFJ': { name: '守卫者型', icon: '🛡️', tags: ['忠诚', '耐心', '温厚'], desc: '你是最温柔的守护者，在幕后默默地用责任感温暖着周围。', career: '理想环境：温馨、稳定且能切实帮助到他人的工作。' },
        'INFJ': { name: '提倡者型', icon: '✨', tags: ['远见', '深度', '使命'], desc: '你是深沉的理想主义者，拥有一套坚定的内在价值观。', career: '理想环境：追求精神成长和社会积极改变的非营利组织。' },
        'ESFP': { name: '表演者型', icon: '🎉', tags: ['热情', '美感', '自发'], desc: '你是生活舞台上的焦点，总是能带给周围人无尽的快乐。', career: '理想环境：充满活力、社交频繁且具有艺术感的工作场所。' },
        'ENFP': { name: '竞选者型', icon: '🌟', tags: ['创意', '自由', '热情'], desc: '你是自由的精神，总是在寻找人与事之间那条无形的纽带。', career: '理想环境：多样化、鼓励自我表达的初创企业或创意工坊。' },
        'ISFP': { name: '探险家型', icon: '🎨', tags: ['美学', '灵活', '低调'], desc: '你是随性的艺术家，喜欢用作品表达内心世界，不随波逐流，享受感官带来的美好。', career: '理想环境：允许独立创作、节奏自由且注重细节的岗位。' },
        'INFP': { name: '调解员型', icon: '🌷', tags: ['理想', '纯粹', '同情'], desc: '你是敏感且富有创造力的灵魂，对生活充满深切的情感连接。', career: '理想环境：安静、尊重个性且充满人文关怀的领域。' }
    };

    let currentIndex = 0;
    let scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
    let history = [];

    function startTest() {
        document.getElementById('welcome-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIndex];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('opt-a-text').innerText = q.a;
        document.getElementById('opt-b-text').innerText = q.b;
        
        const percent = Math.round((currentIndex / 80) * 100);
        document.getElementById('progress-fill').style.width = percent + '%';
        document.getElementById('percent-val').innerText = percent + '%';
        document.getElementById('q-count').innerText = `${String(currentIndex + 1).padStart(2, '0')} / 80`;
        
        localStorage.setItem('mbti_snapshot', JSON.stringify({ currentIndex, scores, history }));
    }

    function handleChoice(val) {
        const q = questions[currentIndex];
        const point = (val === 'A') ? q.t[0] : q.t[1];
        scores[point]++;
        history.push(point);
        
        currentIndex++;
        if(currentIndex < 80) {
            showQuestion();
        } else {
            renderResult();
        }
    }

    function goBack() {
        if(currentIndex > 0) {
            currentIndex--;
            const last = history.pop();
            scores[last]--;
            showQuestion();
        }
    }

    function renderResult() {
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        localStorage.removeItem('mbti_snapshot');

        const res = [
            scores.E >= scores.I ? 'E' : 'I',
            scores.S >= scores.N ? 'S' : 'N',
            scores.T >= scores.F ? 'T' : 'F',
            scores.J >= scores.P ? 'J' : 'P'
        ].join('');

        const data = mbtiData[res];
        document.getElementById('res-icon').innerText = data.icon;
        document.getElementById('res-code').innerText = res;
        document.getElementById('res-name').innerText = data.name;
        document.getElementById('res-desc').innerText = data.desc;
        document.getElementById('res-career').innerText = data.career;

        let tagsHtml = '';
        data.tags.forEach(t => tagsHtml += `<span class="tag"># ${t}</span>`);
        document.getElementById('res-tags').innerHTML = tagsHtml;

        const dims = [['E','I','精力'], ['S','N','感知'], ['T','F','逻辑'], ['J','P','生活']];
        let barsHtml = '';
        dims.forEach(d => {
            const pA = Math.round(scores[d[0]] / (scores[d[0]] + scores[d[1]]) * 100);
            barsHtml += `
                <div class="stat-row">
                    <div class="stat-labels"><span>${d[0]} (${pA}%)</span><span>${d[2]}</span><span>${d[1]} (${100-pA}%)</span></div>
                    <div class="stat-bar-outer">
                        <div style="width:${pA}%; background:white; height:100%;"></div>
                        <div style="width:${100-pA}%; background:rgba(255,255,255,0.2); height:100%;"></div>
                    </div>
                </div>
            `;
        });
        document.getElementById('res-bars').innerHTML = barsHtml;
    }

    function resetTest() {
        currentIndex = 0;
        scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
        history = [];
        document.getElementById('result-screen').classList.remove('active');
        document.getElementById('welcome-screen').classList.add('active');
    }

    document.getElementById('resume-btn').onclick = () => {
        const saved = localStorage.getItem('mbti_snapshot');
        if(saved) {
            const data = JSON.parse(saved);
            currentIndex = data.currentIndex;
            scores = data.scores;
            history = data.history;
            startTest();
        }
    }
</script>
